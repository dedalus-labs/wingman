---
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json

      - name: Extract version
        id: version
        if: ${{ steps.release.outputs.release_created }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.release.outputs.tag_name }}

  publish-pypi:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/wingman-cli
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1

  update-homebrew:
    needs: [release-please, publish-pypi]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/update-homebrew-formula
        with:
          package-name: wingman-cli
          version: ${{ needs.release-please.outputs.version }}
          formula-name: wingman
          description: "AI-powered TUI coding assistant for the terminal"
          homepage: "https://github.com/dedalus-labs/wingman"
          tap-repo: homebrew-dedalus
          tap-token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
