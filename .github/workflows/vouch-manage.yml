name: "Vouch: Manage"
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - uses: mitchellh/vouch/action/setup-vouch@main
      - uses: mitchellh/vouch/action/manage-by-issue@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
